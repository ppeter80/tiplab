<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Tiplab — čoskoro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>🧪</text></svg>">
<style>
  :root{--bg:#000;--txt:#eef1f5;--dim:#8b95a3;--accent:#16d989;--line:#23262e;--card:#0e0f13}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%,#0c2a1f 0%,#000 60%);color:var(--txt);
       font:16px/1.5 -apple-system,Segoe UI,Roboto,system-ui,sans-serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       min-height:100%;text-align:center;padding:24px}
  .logo{font-size:40px;font-weight:800;letter-spacing:1px;margin-bottom:6px}
  .logo b{color:var(--accent)}
  .badge{display:inline-block;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);
         border:1px solid #1c5c43;border-radius:20px;padding:4px 12px;margin-bottom:22px}
  h1{font-size:26px;margin:0 0 10px;font-weight:700}
  p{color:var(--dim);max-width:420px;margin:0 auto 8px}
  .dots{margin:26px 0 30px;display:flex;gap:8px;justify-content:center}
  .dots i{width:9px;height:9px;border-radius:50%;background:#1c5c43;animation:pulse 1.4s infinite}
  .dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1);background:var(--accent)}}
  a.enter{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
         color:var(--txt);text-decoration:none;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;
         transition:.15s}
  a.enter:hover{border-color:var(--accent);color:var(--accent)}
  .foot{position:fixed;bottom:16px;left:0;right:0;color:#555;font-size:12px}
</style>
</head>
<body>
  <div class="logo">Tip<b>lab</b></div>
  <div class="badge">Under construction</div>
  <h1>Pripravujeme niečo dobré.</h1>
  <p>Dátami podložené tipy, nástroje a tipovacia hra, kde hráš proti AI. Spúšťame čoskoro.</p>
  <div class="dots"><i></i><i></i><i></i></div>
  <a class="enter" href="hra.html">🔐 Vstup pre testerov →</a>
  <div class="foot">© Tiplab · 18+ · Hraj s rozumom</div>
</body>
</html>
